name: Release Extension

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.4.0
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Extract changelog for version
        id: changelog
        run: |
          # Extract the changelog content for the specific version
          # Pattern: Start from "## VERSION" and stop at the next "## " or end of file
          VERSION_PATTERN="^## ${VERSION}$"
          CHANGELOG_CONTENT=$(awk -v ver="$VERSION" '
            /^## / { if (found) exit; if ($2 == ver) found=1; next }
            found { print }
          ' CHANGELOG.md)
          
          # If no content found, use a default message
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="- Bug fixes and improvements"
          fi
          
          # Save to environment file (GitHub Actions multiline string handling)
          echo "CHANGELOG_CONTENT<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
      - name: Prepare WXT
        run: npx wxt prepare
      
      - name: Build extension
        run: npm run build
      
      - name: Create ZIP file
        run: |
          npm run zip
          # WXTが生成するファイル名に対応
          ZIP_FILE="dist/tab-position-options-fork-${{ env.VERSION }}-chrome.zip"
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
      
      - name: Authenticate to Google Cloud
        id: google_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore
          create_credentials_file: false
          export_environment_variables: false

      - name: Upload to Chrome Web Store (Draft)
        env:
          ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
        run: |
          ITEM_NAME="publishers/${CHROME_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}"
          UPLOAD_ENDPOINT="https://chromewebstore.googleapis.com/upload/v2/${ITEM_NAME}:upload"
          STATUS_ENDPOINT="https://chromewebstore.googleapis.com/v2/${ITEM_NAME}:fetchStatus"
          UPLOAD_RESPONSE_FILE=$(mktemp)

          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -X POST \
            -T "${ZIP_FILE}" \
            "${UPLOAD_ENDPOINT}" \
            -o "${UPLOAD_RESPONSE_FILE}"

          cat "${UPLOAD_RESPONSE_FILE}"

          UPLOAD_STATE=$(node -e "const fs = require('node:fs'); const response = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(response.uploadState ?? '');" "${UPLOAD_RESPONSE_FILE}")

          if [ "${UPLOAD_STATE}" = "SUCCEEDED" ]; then
            exit 0
          fi

          if [ "${UPLOAD_STATE}" != "IN_PROGRESS" ]; then
            echo "Unexpected upload state: ${UPLOAD_STATE}" >&2
            exit 1
          fi

          for attempt in $(seq 1 12); do
            sleep 5

            STATUS_RESPONSE_FILE=$(mktemp)

            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              "${STATUS_ENDPOINT}" \
              -o "${STATUS_RESPONSE_FILE}"

            cat "${STATUS_RESPONSE_FILE}"

            LAST_ASYNC_UPLOAD_STATE=$(node -e "const fs = require('node:fs'); const response = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(response.lastAsyncUploadState ?? '');" "${STATUS_RESPONSE_FILE}")

            if [ "${LAST_ASYNC_UPLOAD_STATE}" = "SUCCEEDED" ]; then
              exit 0
            fi

            if [ "${LAST_ASYNC_UPLOAD_STATE}" = "IN_PROGRESS" ]; then
              continue
            fi

            echo "Unexpected async upload state: ${LAST_ASYNC_UPLOAD_STATE}" >&2
            exit 1
          done

          echo "Timed out waiting for Chrome Web Store draft upload to finish." >&2
          exit 1

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            ## What's Changed
            ${{ env.CHANGELOG_CONTENT }}
            
            ## Installation
            
            ### Recommended: Install from Chrome Web Store
            🎯 **[Install from Chrome Web Store](https://chrome.google.com/webstore/detail/${{ secrets.CHROME_EXTENSION_ID }})**
            
            ### Alternative: Manual Installation
            For developers or advanced users who prefer manual installation:
            
            1. Download the attached ZIP file below
            2. Extract the ZIP file to a folder
            3. Open Chrome Extensions page (chrome://extensions/)
            4. Enable "Developer mode" in the top right
            5. Click "Load unpacked" and select the extracted folder
          draft: false
          prerelease: false
          artifacts: ${{ env.ZIP_FILE }}
      
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: v${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release: [v${{ env.VERSION }}](https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }})" >> $GITHUB_STEP_SUMMARY
          echo "- Chrome Web Store: [Draft uploaded](https://chrome.google.com/webstore/devconsole)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [Chrome Web Store Developer Dashboard](https://chrome.google.com/webstore/devconsole)" >> $GITHUB_STEP_SUMMARY
          echo "2. Review the draft" >> $GITHUB_STEP_SUMMARY
          echo "3. Submit for review when ready" >> $GITHUB_STEP_SUMMARY
